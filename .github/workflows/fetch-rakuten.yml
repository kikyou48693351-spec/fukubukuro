name: Fetch Rakuten API

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Rakuten Items
        run: |
          mkdir -p data
          curl -s "https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170706?format=json&applicationId=1c2d4f71-981f-4513-ab9f-f5358b6b282e&keyword=%E7%A6%8F%E8%A2%8B&hits=30&sort=-reviewCount&availability=1" -o data/rakuten.json
          cat data/rakuten.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rakuten.json
          git diff --staged --quiet || git commit -m "update rakuten data"
          git push
